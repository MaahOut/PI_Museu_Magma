<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Estoque</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    
        <h1>Gestão de Estoque</h1>
            <a href="./sales.html">Gestao de Vendas</a>
        
            
    
    <main>
        <section>
            <h2>Adicionar Produto</h2>
            <form id="product-form">
                <input type="text" id="product-name" placeholder="Nome do Produto" required>
                <input type="number" id="product-quantity" placeholder="Quantidade" required>
                <input type="number" id="product-price" placeholder="Preço" required>
                <button type="submit">Adicionar Produto</button>
            </form>
        </section>

        <section>
            <h2>Lista de Produtos</h2>
            <table id="product-list">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Quantidade</th>
                        <th>Preço</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </section>
    </main>
    
    <script src="index.js"></script>
</body>
</html>
